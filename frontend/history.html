<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction History - BusFlux</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">

  <!-- PWA Manifest and Mobile Web App Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1c24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <div class="app-layout">
    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <a href="index.html" class="sidebar-logo">
        <div class="logo-icon"><i class="fas fa-bus-alt"></i></div>
        <span>Bus<b>Flux</b></span>
      </a>
      <nav class="sidebar-nav" id="sidebarNav">
        <a href="index.html" class="nav-item" id="sideNavHome">
          <i class="fas fa-home"></i> Home
        </a>
        <a href="buses.html" class="nav-item" id="sideNavBuses">
          <i class="fas fa-bus"></i> Buses
        </a>
        <a href="bookings.html" class="nav-item" id="sideNavBookings">
          <i class="fas fa-ticket"></i> My Bookings
        </a>
        <a href="wallet.html" class="nav-item" id="sideNavWallet">
          <i class="fas fa-wallet"></i> Wallet
        </a>
        <a href="history.html" class="nav-item active" id="sideNavHistory">
          <i class="fas fa-clock-rotate-left"></i> History
        </a>
        <div class="nav-section-label">More</div>
        <a href="#" class="nav-item" onclick="showOffersToast(); return false;">
          <i class="fas fa-tag"></i> Offers
        </a>
        <a href="#" class="nav-item" onclick="scrollToStats(); return false;">
          <i class="fas fa-location-dot"></i> Track Bus
        </a>
        <a href="#" class="nav-item" onclick="showHelpToast(); return false;">
          <i class="fas fa-circle-question"></i> Help Center
        </a>
      </nav>
      <!-- Promo sidebar -->
      <div class="sidebar-offer" id="sidebarOffer" style="display:none;">
        <div class="off-badge">Get 10% OFF</div>
        <p>On your first booking</p>
        <div class="coupon">FLUX10 <i class="fas fa-scissors"></i></div>
      </div>
      <!-- User bottom -->
      <div class="sidebar-user" id="sidebarUser" onclick="handleSidebarUserClick()">
        <div class="sidebar-user-avatar" id="sidebarAvatar">
          <i class="fas fa-user"></i>
        </div>
        <div class="sidebar-user-info">
          <strong id="sidebarUserName">Hi, Traveler 👋</strong>
          <a href="login.html" id="sidebarUserAction">Login / Sign up</a>
        </div>
      </div>
    </aside>
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- ── Main Content ── -->
    <div class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button class="mobile-menu-btn" onclick="openSidebar()" aria-label="Open menu">
          <i class="fas fa-bars"></i>
        </button>
      </header>

      <!-- Page Scroll Area -->
      <div class="page-scroll">

  <div class="container container-wide">
    <h1>Transaction <span>History</span></h1>
    <p class="subtitle">Your wallet recharges, tickets, and conductor deductions</p>

    <div class="tx-filters" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px;">
      <button class="tx-filter-btn active" onclick="filterTransactions(this, 'all')" style="background: var(--primary-gradient); border: transparent; color: #ffffff; padding: 10px 18px; border-radius: 14px; font-size: .8rem; font-weight: 600; cursor: pointer;"><i class="fas fa-list"></i> All</button>
      <button class="tx-filter-btn" onclick="filterTransactions(this, 'recharge')" style="background: var(--bg); border: 1px solid var(--border); color: var(--text-medium); padding: 10px 18px; border-radius: 14px; font-size: .8rem; font-weight: 600; cursor: pointer;"><i class="fas fa-plus-circle"></i> Recharges</button>
      <button class="tx-filter-btn" onclick="filterTransactions(this, 'booking')" style="background: var(--bg); border: 1px solid var(--border); color: var(--text-medium); padding: 10px 18px; border-radius: 14px; font-size: .8rem; font-weight: 600; cursor: pointer;"><i class="fas fa-ticket-alt"></i> Ticket Purchases</button>
    </div>

    <div id="transactionsList" style="display: flex; flex-direction: column; gap: 12px;">
      <div style="text-align: center; padding: 40px; color: var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; margin-bottom: 15px; color: #a855f7;"></i>
        <p>Loading transaction history...</p>
      </div>
    </div>
  </div>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="script.js?v=10"></script>
  <script src="ui-layout.js?v=4"></script>
  <script>
    const WALLET_API = window.API_BASE_URL || ((window.location.protocol === "file:" ? "http://localhost:5000/api" : "/api") + "");
    let allTransactions = [];
    let currentFilter = "all";

    async function loadTransactionHistory() {
      const token = localStorage.getItem("token");
      if (!token) {
        showToast("Please login to view history.", "warning");
        setTimeout(() => window.location.href = "login.html", 1500);
        return;
      }
      try {
        const res = await fetch(`${WALLET_API}/auth/wallet/transactions`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (!res.ok) throw new Error("Failed to load");
        const transactions = await res.json();
        
        if (transactions && transactions.length > 0) {
          allTransactions = transactions;
          renderTransactions(allTransactions);
        } else {
          document.getElementById("transactionsList").innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);"><i class="fas fa-receipt" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i><p>No transaction history found.</p></div>';
        }
      } catch (e) {
        console.error("Failed to load transaction history:", e);
        document.getElementById("transactionsList").innerHTML = '<div style="text-align:center; color:#f43f5e; padding:20px;">Failed to load history. Please try again.</div>';
      }
    }

    function renderTransactions(txList) {
      const list = document.getElementById("transactionsList");
      if (!txList || txList.length === 0) {
        list.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px;">No transactions found for this filter.</div>`;
        return;
      }
      list.innerHTML = txList.map(t => {
        const date = new Date(t.createdAt).toLocaleString("en-IN", {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        
        const isRecharge = t.type === "recharge";
        const amtSign = isRecharge ? "+" : "-";
        const amtColor = isRecharge ? "#10b981" : "#f43f5e";
        const iconHtml = isRecharge 
          ? `<div style="width: 40px; height: 40px; border-radius: 10px; background: rgba(16, 185, 129, 0.15); color: #10b981; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0"><i class="fas fa-plus"></i></div>`
          : `<div style="width: 40px; height: 40px; border-radius: 10px; background: rgba(244, 63, 150, 0.15); color: #f43f5e; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0"><i class="fas fa-ticket"></i></div>`;
        
        let detailsHtml = "";
        if (isRecharge) {
          detailsHtml = `
            <div style="flex: 1; min-width: 0; text-align: left;">
              <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-dark);">Wallet Recharge</div>
              <div style="font-size: 0.72rem; color: var(--text-medium); margin-top: 2px;">Via ${t.method || "Razorpay"}${t.bonus ? ` · Includes ₹${t.bonus} Bonus` : ""}</div>
              <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">${date}</div>
            </div>
          `;
        } else {
          detailsHtml = `
            <div style="flex: 1; min-width: 0; text-align: left;">
              <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-dark);">Ticket Purchase</div>
              <div style="font-size: 0.72rem; color: var(--text-medium); margin-top: 2px;">${t.busName || "Ride"} · Route: ${t.route}</div>
              <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">${date}</div>
            </div>
          `;
        }
        
        const totalVal = isRecharge ? (t.totalCredit || t.amount) : Math.abs(t.amount);
        
        return `
          <div style="display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(108,63,214,0.05);">
            ${iconHtml}
            ${detailsHtml}
            <div style="text-align: right; flex-shrink: 0;">
              <div style="font-size: 1.1rem; font-weight: 800; color: ${amtColor};">${amtSign}₹${totalVal.toLocaleString('en-IN')}</div>
              <div style="font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px;">${t.status || "Completed"}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function filterTransactions(btn, type) {
      document.querySelectorAll(".tx-filter-btn").forEach(b => {
        b.style.background = "var(--bg)";
        b.style.color = "var(--text-medium)";
        b.style.border = "1px solid var(--border)";
      });
      if (btn) {
        btn.style.background = "var(--primary-gradient)";
        btn.style.color = "#ffffff";
        btn.style.border = "transparent";
      }
      currentFilter = type;

      if (type === "all") {
        renderTransactions(allTransactions);
      } else if (type === "recharge") {
        renderTransactions(allTransactions.filter(t => t.type === "recharge"));
      } else if (type === "booking") {
        renderTransactions(allTransactions.filter(t => t.type === "booking"));
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      window.renderTransactionHistory = loadTransactionHistory;
      loadTransactionHistory();
    });
  </script>
</body>
</html>
